name: lint
on: [push, pull_request]
jobs:
  clang-format:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - uses: DoozyX/clang-format-lint-action@v0.20
      with:
        source: 'src lib'
        exclude: 'lib/NintendoSDK lib/aarch64 lib/agl lib/eui lib/sead'
        clangFormatVersion: 18
  custom-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      with:
        submodules: recursive
    - name: Set up python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'
        cache: 'pip'
    - name: Set up python package dependencies
      run: pip install capstone colorama cxxfilt pyelftools watchdog python-Levenshtein toml
    - name: Run custom code styling checks
      run: tools/check-format.py --ci

  custom-libclang-lint:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v5
      with:
        submodules: recursive
    - name: Set up dependencies
      run: brew install cmake
    - name: Set up python package dependencies
      run: pip3 install colorama cxxfilt pyelftools watchdog toml --break-system-packages
    - name: Set up cache for toolchain
      uses: actions/cache@v4
      with:
        key: tools_libs
        path: |
          toolchain/bin
          toolchain/include
          toolchain/cache-version-url.txt
    - name: Create source file that includes all headers
      run: bash ./.github/scripts/test-compile-create.sh --all-combined-only
    - name: Run simplified setup
      # We set "Unix Makefiles" as the cmake backend to avoid needing to install Ninja
      # as we don't actually build the project through a build system here
      run: tools/setup.py --project --cmake_backend "Unix Makefiles"
    - name: Run OdysseyDecompLinter
      run: |
        out="$(tools/linter)"
        echo $out
        if echo $out | grep -q "$(printf '\x1b\[93m')"; then
            exit 1
        fi
